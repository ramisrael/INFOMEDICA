<!DOCTYPE html>
<html>
<head>
  <title>Registro Médico</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Fuente bonita -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Poppins', sans-serif; }
    h2 { color: #0d6efd; font-weight: 600; }
  </style>
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="card p-4 shadow-lg">

    <h2 class="text-center mb-4">🩺 Registro Médico</h2>

    <input id="nombre" class="form-control mb-2" placeholder="Nombre completo">
    <input id="edad" class="form-control mb-2" placeholder="Edad">
    <input id="sangre" class="form-control mb-2" placeholder="Tipo de sangre">
    <input id="alergias" class="form-control mb-2" placeholder="Alergias">
    <input id="enfermedades" class="form-control mb-2" placeholder="Enfermedades (diabetes, asma...)">
    <input id="medicamentos" class="form-control mb-2" placeholder="Medicamentos actuales">
    <input id="contacto" class="form-control mb-2" placeholder="Contacto de emergencia">

    <button class="btn btn-primary w-100 mt-2" onclick="guardar()">Generar QR</button>

    <div class="text-center mt-4">
      <img id="qr" style="display:none;">
      <br><br>
      <a id="descargar" class="btn btn-success" style="display:none;">⬇ Descargar QR</a>
    </div>

  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDHrG-U9JEwo-AesKD6CCNDDgXZ_lB3Z14",
  authDomain: "web-medica-49502.firebaseapp.com",
  databaseURL: "https://web-medica-49502-default-rtdb.firebaseio.com",
  projectId: "web-medica-49502",
  storageBucket: "web-medica-49502.firebasestorage.app",
  messagingSenderId: "297387802420",
  appId: "1:297387802420:web:c3afc54720d20ba44d6f61"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function guardar() {

  let data = {
    nombre: document.getElementById("nombre").value,
    edad: document.getElementById("edad").value,
    sangre: document.getElementById("sangre").value,
    alergias: document.getElementById("alergias").value,
    enfermedades: document.getElementById("enfermedades").value,
    medicamentos: document.getElementById("medicamentos").value,
    contacto: document.getElementById("contacto").value
  };

  let ref = db.ref("usuarios").push();
  ref.set(data);

  let id = ref.key;

  let link = "https://ramisrael.github.io/INFOMEDICA/perfil.html?id=" + id;

  let qrURL = "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=" + encodeURIComponent(link);

  let qr = document.getElementById("qr");
  qr.src = qrURL;
  qr.style.display = "block";

  let descarga = document.getElementById("descargar");
  descarga.href = qrURL;
  descarga.download = "qr-medico.png";
  descarga.style.display = "inline-block";
}
</script>

</body>
</html>
